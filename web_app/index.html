<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Creditos JSON</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Creditos JSON</h1>
        <p id="sourceMeta">Carga un XLSX o structure_json para empezar.</p>
      </div>
    </header>

    <nav class="app-tabs" aria-label="Secciones">
      <button class="active" type="button" data-tab="settings">Ajustes</button>
      <button type="button" data-tab="structure">Estructura</button>
      <button type="button" data-tab="json">JSON</button>
      <button type="button" data-tab="pdf">PDF</button>
    </nav>

    <main>
      <section id="settingsPane" class="tab-pane active">
        <div class="settings-panel">
          <div class="panel-heading">
            <h2>Ajustes comunes</h2>
          </div>
          <div class="settings-body">
            <div class="file-actions">
              <label class="button primary">
                Abrir XLSX
                <input id="xlsxInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
              </label>
              <button id="openStructureBtn" type="button">Abrir structure_json</button>
              <input id="structureInput" class="hidden-input" type="file" accept="application/json,.json">
              <button id="saveStructureBtn" type="button">Guardar</button>
              <button id="saveStructureAsBtn" type="button">Guardar como</button>
            </div>
            <div class="field-grid">
              <label for="defaultDurationInput">Duracion cartela por defecto</label>
              <input id="defaultDurationInput" class="text-input" type="number" min="0" step="0.1">
            </div>
            <div class="field-grid">
              <label for="defaultAutoLinesInput">Lineas antes de salto automatico</label>
              <input id="defaultAutoLinesInput" class="text-input" type="number" min="1" step="1">
            </div>
            <div class="font-actions">
              <button id="loadSystemFontsBtn" type="button">Cargar fuentes del sistema</button>
              <span id="fontStatus">Fuentes basicas cargadas</span>
            </div>
            <div id="typographySettings" class="typography-settings"></div>
          </div>
        </div>
      </section>

      <section id="structurePane" class="tab-pane">
        <div class="workspace">
          <aside class="block-list-panel">
            <div class="panel-heading">
              <h2>Cartelas</h2>
              <span id="blockCount">0</span>
            </div>
            <div id="blockList" class="block-list"></div>
          </aside>

          <section class="editor-panel">
            <div class="panel-heading">
              <h2 id="editorTitle">Sin cartela seleccionada</h2>
              <span id="editorKind"></span>
            </div>
            <div id="editorBody" class="editor-body empty-state">
              Carga un XLSX y selecciona una cartela.
            </div>
          </section>
        </div>
      </section>

      <section id="jsonPane" class="tab-pane">
        <aside class="json-panel">
          <div class="panel-heading">
            <h2>Salida</h2>
            <div class="json-actions">
              <div class="segmented" role="tablist">
                <button id="structureTab" class="active" type="button">Structure</button>
                <button id="renderTab" type="button">Render</button>
              </div>
              <button id="saveRenderBtn" type="button">Guardar render</button>
              <button id="saveRenderAsBtn" type="button">Guardar render como</button>
            </div>
          </div>
          <textarea id="jsonPreview" spellcheck="false" readonly></textarea>
        </aside>
      </section>

      <section id="pdfPane" class="tab-pane">
        <div class="pdf-panel">
          <div class="panel-heading">
            <h2>Preview PDF</h2>
            <div class="pdf-toolbar">
              <div class="pdf-nav">
                <button id="pdfFirstPageBtn" type="button" title="Primera pagina" aria-label="Primera pagina">&#x23EE;</button>
                <button id="pdfPrevPageBtn" type="button" title="Pagina anterior" aria-label="Pagina anterior">&#x25C0;</button>
                <input id="pdfPageNumberInput" class="text-input pdf-page-number" type="number" min="1" step="1" value="1" aria-label="Numero de pagina">
                <span id="pdfTotalPages">/ 0</span>
                <button id="pdfNextPageBtn" type="button" title="Pagina siguiente" aria-label="Pagina siguiente">&#x25B6;</button>
                <button id="pdfLastPageBtn" type="button" title="Ultima pagina" aria-label="Ultima pagina">&#x23ED;</button>
              </div>
              <input id="pdfPageTitleInput" class="text-input pdf-toolbar-title" type="text" placeholder="Titulo pagina">
              <input id="pdfBaseNameInput" class="text-input pdf-base-name" type="text" placeholder="Nombre base PDF">
              <button id="exportCurrentPdfBtn" type="button">Exportar pagina</button>
              <button id="exportAllPdfBtn" type="button">Exportar todas</button>
              <button id="pdfMinusLinesBtn" type="button">-</button>
              <span id="pdfLineStatus">0/0</span>
              <button id="pdfPlusLinesBtn" type="button">+</button>
            </div>
          </div>
          <div id="pdfPreview" class="pdf-preview empty-state">
            Carga un XLSX para ver las paginas.
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
