<!doctype html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        color: #202124;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      button {
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        color: #202124;
        cursor: pointer;
        font-size: 13px;
        min-height: 34px;
        padding: 0 12px;
      }

      button.primary {
        background: #1a73e8;
        border-color: #1a73e8;
        color: #fff;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        height: 540px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-family: Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        padding: 12px;
        resize: none;
        white-space: pre;
      }

      .status {
        font-size: 12px;
        min-height: 18px;
        margin-top: 8px;
        color: #5f6368;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="primary" onclick="copyJson()">Copiar</button>
      <button onclick="downloadJson()">Descargar</button>
      <button onclick="saveToDrive()">Guardar en Drive</button>
    </div>
    <textarea id="json" readonly>Cargando...</textarea>
    <div class="status" id="status"></div>

    <script>
      let currentJson = '';
      let currentFileName = 'credits.json';

      google.script.run
        .withSuccessHandler((payload) => {
          currentJson = payload.json;
          currentFileName = payload.fileName;
          document.getElementById('json').value = payload.json;
          setStatus('JSON listo para la hoja activa: ' + payload.sheetName);
        })
        .withFailureHandler((error) => {
          setStatus(error.message || String(error));
        })
        .getActiveSheetCreditsPayload();

      function copyJson() {
        const textarea = document.getElementById('json');
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        setStatus('JSON copiado.');
      }

      function downloadJson() {
        const blob = new Blob([currentJson], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = currentFileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus('Descarga iniciada.');
      }

      function saveToDrive() {
        setStatus('Guardando en Drive...');
        google.script.run
          .withSuccessHandler((url) => {
            setStatus('Guardado en Drive: ' + url);
          })
          .withFailureHandler((error) => {
            setStatus(error.message || String(error));
          })
          .saveActiveSheetJsonToDrive();
      }

      function setStatus(message) {
        document.getElementById('status').textContent = message;
      }
    </script>
  </body>
</html>
